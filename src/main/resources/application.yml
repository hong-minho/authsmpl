server:
  port: 8080

adfs:
  issuer: https://stsds.secsso.net/adfs
  jwks-uri: https://stsds.secsso.net/adfs/discovery/keys
  # 앱 등록 시 ADFS에서 발급받은 Client ID (Relying Party Identifier)
  audience: visit-client
  # JWKS 캐시 갱신 최소 간격 (초) - 동일 kid 없을 때 재조회 쿨다운
  jwks-refresh-cooldown-seconds: 300

logging:
  level:
    com.example.authsmpl: DEBUG
    org.springframework.security: INFO
